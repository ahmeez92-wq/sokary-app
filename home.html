<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكري - الرئيسية</title>
    
    <!-- ده الجديد بتاع الأوفلاين -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-2">أهلاً بيك يا <span id="userName"></span></h1>
        <p class="text-center text-gray-500 mb-6">تطبيق سكري اشتغل خلاص ✅</p>
        
        <div class="grid grid-cols-2 gap-4">
            <button class="bg-blue-500 text-white p-4 rounded-lg">قياس السكر</button>
            <button class="bg-green-500 text-white p-4 rounded-lg">الوجبات</button>
            <button class="bg-orange-500 text-white p-4 rounded-lg">الرياضة</button>
            <button class="bg-purple-500 text-white p-4 rounded-lg">التقارير</button>
        </div>

        <button onclick="logout()" class="w-full bg-red-500 text-white p-3 rounded-lg mt-6">تسجيل خروج</button>
    </div>

<script>
const user = JSON.parse(localStorage.getItem('userProfile'));
if(user) {
    document.getElementById('userName').innerText = user.name;
} else {
    window.location.href = 'index.html';
}

function logout() {
    localStorage.removeItem('userProfile');
    window.location.href = 'index.html';
}
</script>
</body>
</html>
