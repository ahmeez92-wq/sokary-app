<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكري - تسجيل البيانات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">أهلاً بيك في سُكري</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">الاسم بالكامل *</label>
                <input id="name" type="text" class="w-full p-3 border rounded-lg" placeholder="اكتب اسمك">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">السن *</label>
                <input id="age" type="number" class="w-full p-3 border rounded-lg" placeholder="30">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">الوزن كجم *</label>
                <input id="weight" type="number" class="w-full p-3 border rounded-lg" placeholder="80">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">التراكمي HbA1c</label>
                <input id="hba1c" type="number" step="0.1" class="w-full p-3 border rounded-lg" placeholder="7.5">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">نوع السكر *</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectType('نوع أول')" id="type1" class="type-btn p-3 border rounded-lg text-sm">نوع أول</button>
                    <button onclick="selectType('نوع تاني')" id="type2" class="type-btn p-3 border rounded-lg text-sm">نوع تاني</button>
                </div>
            </div>

            <button onclick="saveData()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold mt-6">
                حفظ الملف وابدأ
            </button>
        </div>
    </div>

<script>
let selectedType = '';

function selectType(type) {
    selectedType = type;
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-white');
    });
    event.target.classList.add('bg-blue-600', 'text-white');
}

function saveData() {
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value;
    const weight = document.getElementById('weight').value;
    const hba1c = document.getElementById('hba1c').value;

    if (!name || !age || !weight || !selectedType) {
        alert('لازم تملا كل الخانات اللي عليها * وتختار نوع السكر');
        return;
    }

    const userData = {
        name: name,
        age: age,
        weight: weight,
        hba1c: hba1c,
        type: selectedType
    };

    localStorage.setItem('userProfile', JSON.stringify(userData));
    alert('تم حفظ البيانات بنجاح');
    window.location.href = 'home.html';
}
</script>
</body>
</html>
